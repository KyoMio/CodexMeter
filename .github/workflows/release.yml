name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}   # 手动触发，用于调试；使用最近一个 tag 的版本号

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

# Needed for softprops/action-gh-release to create the release & upload assets.
permissions:
  contents: write

jobs:
  build-release:
    name: Assemble & sign release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout（完整历史，changelog 和 git describe 依赖）────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. 从 tag 解析版本号 ──────────────────────────────────────────────
      - name: Resolve version from tag
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # ── 3. 自动生成 changelog（两个 tag 之间的提交，按类型分组）─────────
      - name: Generate changelog
        id: changelog
        run: |
          CURRENT_TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")

          if [[ -n "$PREV_TAG" ]]; then
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
            SINCE_TEXT="Changes since ${PREV_TAG}"
          else
            RANGE="${CURRENT_TAG}"
            SINCE_TEXT="Initial release"
          fi

          FEATURES=$(git log "$RANGE" --pretty=format:"%s" | grep -E "^feat" | sed 's/^feat[^:]*: //' | sed 's/^/- /' || true)
          FIXES=$(git log "$RANGE" --pretty=format:"%s" | grep -E "^fix" | sed 's/^fix[^:]*: //' | sed 's/^/- /' || true)
          OTHERS=$(git log "$RANGE" --pretty=format:"%s" | grep -Ev "^(feat|fix|chore|docs|test|refactor|ci)" | sed 's/^/- /' || true)

          {
            echo "body<<CHANGELOG_EOF"
            echo "## ${SINCE_TEXT}"
            echo ""
            if [[ -n "$FEATURES" ]]; then
              echo "### ✨ New Features"
              echo "$FEATURES"
              echo ""
            fi
            if [[ -n "$FIXES" ]]; then
              echo "### 🐛 Bug Fixes"
              echo "$FIXES"
              echo ""
            fi
            if [[ -n "$OTHERS" ]]; then
              echo "### 🔧 Other Changes"
              echo "$OTHERS"
              echo ""
            fi
            if [[ -n "$PREV_TAG" ]]; then
              echo "**Full diff:** [\`${PREV_TAG}...${CURRENT_TAG}\`](../../compare/${PREV_TAG}...${CURRENT_TAG})"
            fi
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      # ── 4. JDK 21 ─────────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # ── 5. Android SDK ────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Skip the action's default install ("tools platform-tools"); the legacy
          # `tools` package archive is obsolete and fails with "unknown archive".
          # Required packages are installed explicitly in the next step.
          packages: ''

      - name: Install SDK platform & build-tools
        run: |
          sdkmanager --install \
            "platforms;android-37.0" \
            "build-tools;37.0.0" \
            "platform-tools"

      # ── 6. Gradle wrapper 校验 ────────────────────────────────────────────
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      # ── 7. Gradle 依赖缓存 ────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── 8. 把 tag 版本号同步进 build.gradle.kts ──────────────────────────
      - name: Sync versionName from tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"${VERSION}\"/" app/build.gradle.kts
          echo "versionName synced to ${VERSION}"

      # ── 9. 解码 keystore ──────────────────────────────────────────────────
      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_PATH="${RUNNER_TEMP}/codexmeter-release.jks"
          # Strip any whitespace/CR/newlines the secret may carry (BSD base64
          # wraps lines; copy/paste can add CR) — GNU base64 -d rejects them.
          printf '%s' "${KEYSTORE_BASE64}" | tr -d '[:space:]' | base64 -d > "${KEYSTORE_PATH}"
          if [[ ! -s "${KEYSTORE_PATH}" ]]; then
            echo "::error::Decoded keystore is empty — check the RELEASE_KEYSTORE_BASE64 secret."
            exit 1
          fi
          echo "KEYSTORE_PATH=${KEYSTORE_PATH}" >> "$GITHUB_ENV"

      # ── 10. 编译 Release APK ──────────────────────────────────────────────
      - name: Assemble release APK
        env:
          RELEASE_KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          ANTIGRAVITY_OAUTH_CLIENT_SECRET: ${{ secrets.ANTIGRAVITY_OAUTH_CLIENT_SECRET }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3072m -Dfile.encoding=UTF-8"
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── 11. 定位并重命名 APK ──────────────────────────────────────────────
      - name: Locate and rename APK
        id: apk
        run: |
          SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          DEST="codexmeter-${{ steps.version.outputs.version }}.apk"
          cp "$SRC" "$DEST"
          echo "path=${DEST}" >> "$GITHUB_OUTPUT"

      # ── 12. 验证 APK 签名 ─────────────────────────────────────────────────
      - name: Verify APK signature
        run: |
          BUILD_TOOLS=$(ls "${ANDROID_SDK_ROOT}/build-tools/" | sort -V | tail -1)
          "${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS}/apksigner" verify --verbose \
            "${{ steps.apk.outputs.path }}" 2>&1 | grep -E 'Verified|v[0-9]'

      # ── 13. 上传 artifact ─────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: codexmeter-${{ steps.version.outputs.version }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 90

      # ── 14. 创建 GitHub Release ───────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: CodexMeter ${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 15. 清理 keystore 临时文件 ────────────────────────────────────────
      - name: Remove keystore temp file
        if: always()
        run: rm -f "${KEYSTORE_PATH:-}"
